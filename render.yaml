services:
  # Backend — Node.js web service 
  - type: web
    name: task-tracker-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: task-tracker-db
          property: connectionString
      # Lock down CORS to only the frontend URL:
      - key: FRONTEND_URL
        value: https://sprout-info-1.onrender.com

  # Frontend — Static site
  - type: web
    name: task-tracker-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      # Use the actual backend Render URL:
      - key: REACT_APP_API_URL
        value: https://sprout-info.onrender.com/tasks

databases:
  - name: task-tracker-db
    databaseName: task_tracker
    user: task_tracker_user
